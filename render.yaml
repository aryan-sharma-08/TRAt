services:
  - type: web
    name: tract-app
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false # Render will prompt you to enter your Gemini API key (optional)
      - key: DATABASE_URL
        sync: false # Render will prompt you to enter your Supabase Connection String
